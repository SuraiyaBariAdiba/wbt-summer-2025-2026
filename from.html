<!DOCTYPE> <html> 
    <head>
        <title> From Information </title>
    </head>
    <body>
        <table>
                        <tr>
                            <td><label for="firstName">First Name:</label></td>
                            <td><input type="text" id="firstName" name="firstName"></td>
                        </tr>
                        <tr>
                            <td><label for="lastName">Last Name:</label></td>
                            <td><input type="text" id="lastName" name="lastName"></td>
                        </tr>
                        <tr>
                            <td>
                                <label for="company">Company:</label>
                            </td>
                            <td>
                                <input type="text" id="company" name="company">
                            </td>
                        </tr>
                        <tr>
                            <td><label for="address1">Address 1:</label></td>
                            <td><input type="text" id="address1" name="address1"></td>
                        </tr>
                        <tr>
                            <td><label for="address2">Address 2:</label></td>
                            <td><input type="text" id="address2" name="address2"></td>
                        </tr>
                        <tr>
                            <td><label for="city">City:</label></td>
                            <td><input type="text" id="city" name="city"></td>
                        </tr>
                        <tr>
                            <td><label for="state">State:</label></td>
                            <td>
                             <select id ="state" name="state">
                                    <option value="dhaka">Dhaka</option>
                                    <option value="khulna">Khulna</option>
                                    <option value="chittagong">Chittagong</option>
                                    <option value="other">Other</option>
                                </select>
                            </td>
                        </tr>
                        <tr>
                            <td><label for="zip code">Zip Code:</label></td>
                            <td><input type="text" id="zip code" name="zip code"></td>
                        </tr>
                        <tr>
                            <td><label for="country"> Country:</label></td>
                            <td>
                             <select id ="country" name="country">
                                    <option value="bd">Bangladesh</option>
                                    <option value="in">India</option>
                                    <option value="us">United States</option>
                                    <option value="other">Other</option>
                                </select>
                            </td>
                        </tr>
                        <tr>
                            <td><label for="phone">Phone:</label></td>
                            <td><input type="text" id="phone" name="phone"></td>
                        </tr>
                        <tr>
                            <td><label for="fax">Fax:</label></td>
                            <td><input type="text" id="fax" name="fax"></td>
                        </tr>
                        <tr>
                            <td><label for="email">Email:</label></td>
                            <td><input type="email" id="email" name="email"></td>
                        </tr>
                        <tr>
                            <td><label for="donation amount">Donation Amount:</label></td>
                            <td>
                                <input type="radio" id="none" name="donationAmount" value="none">None
                                <input type="radio" id="small" name="donationAmount" value="small">$50
                                <input type="radio" id="medium" name="donationAmount" value="medium">$100
                                <input type="radio" id="large" name="donationAmount" value="large">$200
                                <input type="radio" id="other" name="donationAmount" value="other">Other
                                
                            </td>
                            
                        
                        </tr>
                        <tr>
          <td><label for="other amount">Other Amount:</label></td>
          <td><textarea id="other amount" name="other amount" rows="1" cols="30"
              placeholder="Write your amount..."></textarea></td>
        </tr>
        <tr>
            <td><label for="recurring donation">Recurring Donation:</label></td>
            <td>
                <input type="checkbox" id="recurring donation" name="recurringDonation" value="yes">
                <label for="recurring donation">Yes, I am interested in giving regularly</label>
            </td>
        </tr>
        <tr>
            <td></td>
                            <td><label for="monthly">Monthly Credit Card:</label>
                            <td><input type="text" id="monthly" name="monthly">
                            <td><label for="for">for:</label>
                            <td><input type="text" id="for" name="for">
                            <td><label for="months">Months:</label></td>
                        
                        </tr>
    </table>
</body>
